<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiAudit — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0A0A;--surface:#111;--surface2:#1A1A1A;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#F0F0F0;--muted:#888;--accent:#BEFF5A;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:400px;padding:24px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--accent);letter-spacing:-1px;text-align:center;margin-bottom:8px;}
.tagline{text-align:center;font-size:13px;color:var(--muted);margin-bottom:36px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 28px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color 0.15s;}
.form-group input:focus{outline:none;border-color:var(--accent);}
.btn{width:100%;background:var(--accent);color:#0A0A0A;border:none;border-radius:8px;padding:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;cursor:pointer;margin-top:8px;}
.btn:hover{background:#a8e64d;}
.link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
.link a{color:var(--accent);text-decoration:none;font-weight:500;}
.flash{background:rgba(239,159,39,0.15);border:1px solid rgba(239,159,39,0.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#f4c06a;}
.demo{margin-top:20px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--muted);}
.demo strong{color:var(--text);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">DigiAudit</div>
  <div class="tagline">Diagnóstico de madurez digital empresarial</div>
  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="tu@empresa.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Iniciar sesión →</button>
    </form>
    <div class="link">¿Sin cuenta? <a href="{{ url_for('register') }}">Regístrate</a></div>
    <div class="demo">
      <strong>Demo admin:</strong> admin@digiaudit.com / admin123
    </div>
  </div>
</div>
</body>
</html>
